databaseChangeLog:
  - changeSet:
      id: 001-create-users
      author: Mikhail
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_users
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_users_email
        - addDefaultValue:
            tableName: author
            columnName: id
            defaultValueComputed: gen_random_uuid()
