databaseChangeLog:
  - changeSet:
      id: 006-create-outbox-event
      author: mikhail
      changes:
        - createTable:
            tableName: outbox_event
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_outbox_event
                    nullable: false
              - column:
                  name: aggregate_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: aggregate_id
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: topic
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: attempt_count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: processed_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: next_retry_at
                  type: TIMESTAMP WITH TIME ZONE

  - changeSet:
      id: 007-create-index-outbox-status-created
      author: mikhail
      changes:
        - createIndex:
            tableName: outbox_event
            indexName: idx_outbox_event_status_created_at
            columns:
              - column:
                  name: status
              - column:
                  name: created_at

  - changeSet:
      id: 008-create-index-outbox-next-retry
      author: mikhail
      changes:
        - createIndex:
            tableName: outbox_event
            indexName: idx_outbox_event_next_retry_at
            columns:
              - column:
                  name: next_retry_at