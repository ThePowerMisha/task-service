databaseChangeLog:
  - changeSet:
      id: 002-create-tasks
      author: Mikhail
      changes:
        - createTable:
            tableName: tasks
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_tasks
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: UUID

  - changeSet:
      id: 003-add-fk-tasks-user
      author: Mikhail
      changes:
        - addForeignKeyConstraint:
            baseTableName: tasks
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_tasks_user

  - changeSet:
      id: 004-create-index-tasks-user
      author: Mikhail
      changes:
        - createIndex:
            tableName: tasks
            indexName: idx_tasks_user_id
            columns:
              - column:
                  name: user_id

  - changeSet:
      id: 005-create-index-tasks-status
      author: Mikhail
      changes:
        - createIndex:
            tableName: tasks
            indexName: idx_tasks_status
            columns:
              - column:
                  name: status